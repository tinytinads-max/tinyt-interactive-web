/* Wrapper */
.wrapper{
    width:100%;
    max-width:1600px;
    margin:0 auto;
    padding:150px 40px 60px;
    display:flex;
    gap:60px;
    align-items:flex-start;
}
/* Sidebar */

.sidebar{
width:120px;
min-width:120px;
/* height:840px; */
/* background:rgba(255,255,255,.18); */
display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;
padding:45px 0;
}

.sidebar .line{
width:1px;
height:500px;
background:#777;
}

.sidebar .logo{
width:66px;
height:66px;
border-radius:50%;
background:rgba(255,255,255,.4);
display:flex;
justify-content:center;
align-items:center;
font-size:34px;
}

/* Content */

.content{
flex:1;
margin: 50px 0 0 0;
}

.tag{
display:inline-block;
background:#222;
color:#fff;
padding:10px 10px;
/* border-radius:6px; */
font-size:14px;
margin-bottom:25px;
}

h1{
font-size:72px;
font-weight:300;
margin-bottom:30px;
font-family: 'Mulish', sans-serif;
}

.small-line{
width:70px;
height:1px;
background:#444;
margin-bottom:35px;
}

.subtitle{
font-size:14px;
color:#444;
max-width:620px;
line-height:1.5;
margin-bottom:90px;
}

/* Services */

.services{
    display:grid;
    grid-template-columns:repeat(5,minmax(180px,1fr));
    gap:30px;
}

.service{
padding-right:40px;
padding-left:10px;
border-right:1px solid rgba(0,0,0,.2);
transition:.3s;
}

.service:last-child{
border-right:none;
}

.service:hover{
transform:translateY(-8px);
}

.icon{
width: 100px;
height:100px;
border-radius:50%;
background:rgba(255,255,255,.25);
display:flex;
justify-content:center;
align-items:center;
font-size:52px;
margin-bottom:30px;
}

.service h3{
font-size:18px;
margin-bottom:22px;
}

.service hr{
width:45px;
border:none;
height:1px;
background:#444;
margin-bottom:25px;
}

.service p{
font-size:17px;
line-height:1.8;
color:#333;
margin-bottom:45px;
}

.learn{
display:inline-flex;
align-items:center;
gap:18px;
font-size:16px;
text-decoration:none;
color:#111;
font-weight:500;
}

.learn i{
transition:.3s;
}

.learn:hover i{
transform:translateX(8px);
}

}

/* Black Curtain Animation */
.curtain{
    position: fixed;
    inset: 0;
    background: #0f0f0fd3;
    z-index: 99999;
    animation: openCurtain 1s ease-in-out forwards;
}

@keyframes openCurtain{
    from{
        transform: translateY(0);
    }
    to{
        transform: translateY(-100%);
    }
}
/* Black Curtain Animation */
/* MENU ICON */

.menu-toggle{
    position:fixed;
    top:30px;
    left:30px;
    z-index:1001;
    cursor:pointer;
}

.menu-toggle span{
    display:block;
    width:30px;
    height:3px;
    background:#fff;
    margin:6px 0;
    transition:.4s;
}

/* FULL WIDTH MENU */

.menu{
    position:fixed;
    top:-100%;
    left:0;
    width:100%;
    background:#2f2f2f;
    transition:.5s;
    z-index:1000;
}

.menu.active{
    top:0;
}

.menu ul{
    list-style:none;
    text-align:center;
}

/* .menu ul li{
    border-bottom:1px solid rgba(255,255,255,.1);
} */

.menu ul li a{
    display:block;
    color:#fff;
    text-decoration:none;
    padding:22px;
    font-size:45px;
    letter-spacing:1px;
    transition:.3s;
  
}
/* dropdown menu */
.menu{
    position:fixed;
    top:-100vh;
    left:0;
    width:100%;
    height:100vh;    
    background:#2f2f2f;
    transition:.5s;
    z-index:1000;
    display:flex;
    justify-content:center;
    align-items:center;
    
}
.menu.active{
    top:0;
}

.menu ul{
    list-style:none;
    width:100%;
    text-align:center;
}

/* .menu ul li{
    border-bottom:1px solid rgba(255,255,255,.15);
} */

.menu ul li a{
    display:block;
    padding:23px;
    color:#fff;
    text-decoration:none;
    font-size:45px;
    font-weight:bold;
    letter-spacing:2px;
    transition:.3s;

}

 .menu ul li a:hover{
    color: #999;
    transform: translateX(10px);
} 
/* 
.dropdown a:hover{
    color: #999;
    transform: translateX(10px);
} */

.menu-toggle.active span:nth-child(1){
    transform:rotate(45deg) translate(6px,6px);
}

.menu-toggle.active span:nth-child(2){
    opacity:0;
}

.menu-toggle.active span:nth-child(3){
    transform:rotate(-45deg) translate(7px,-7px);
}
.menu-toggle span{
    display:block;
    width:30px;
    height:3px;
    background:#000;
    margin:6px 0;
    transition:.4s;
}
.menu-toggle.active span{
    background:#fff;
}

    align-items: center;
    margin-right: 40px;
    top:40px;
    gap:20px;
    position: relative;
    z-index: 500;
}
