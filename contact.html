<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Mulish:wght@200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
   font-family: 'Mulish', sans-serif;
    background:#aaabaf;
    color:#111;
}

.wrapper{
    width:90%;
    max-width:1400px;
    margin:auto;
}

/* MENU */

.menu-btn{
    padding:40px 0;
    font-size:34px;
    cursor:pointer;
}

.menu{
    position:absolute;
    top:50px;
    left:50px;
    cursor:pointer;
}

.menu span{
    display:block;
    width:42px;
    height:4px;
    background:#111;
    margin:8px 0;
    border-radius:10px;
}
/* CONTACT SECTION */

.contact-section{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:80px;
    padding:160px 0 80px;
}

/* LEFT SIDE */

.contact-left{
    flex:1;
    position:relative;
    padding-left:60px;
}

.side-line{
    position:absolute;
    left:0;
    top:-50px;
    width:1px;
    height:400px;
    background:#222;
}

.logo-circle{
    position:absolute;
    left:-37px;
    top:300px;
    width:75px;
    height:75px;
    border-radius:50%;
    /* background:#f4eee6; */
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:38px;
}

.sub-title {
    /* letter-spacing: 4px; */
    font-size: 14px;
    background: #1e1e1d;
    color: #fff;
    width: 92px;
    /* height: 30px; */
    padding: 10px 10px;
    position: relative;
    top: -48px;
}

.gold-line{
    width:60px;
    height:2px;
    background:#e4d3bc;
    margin:20px 0;
}

.contact-left h1{
    font-size:72px;
    font-weight:100;
    line-height:1;
    margin-bottom:40px;
   font-family: 'Mulish', sans-serif;
}

.contact-left p{
    font-size:15px;
    line-height:1.8;
    color:#333;
}

/* RIGHT FORM */

.contact-form{
    flex:1;
    padding:35px;
    border-radius:15px;
    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.2);
    backdrop-filter:blur(8px);
    box-shadow:0 15px 40px rgba(0,0,0,.08);
}

.row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.contact-form input,
.contact-form textarea{
    width:100%;
    padding:18px;
    border:1px solid #d0d0d0;
    background:rgba(255,255,255,.1);
    outline:none;
    font-size:16px;
}

.contact-form textarea{
    height:170px;
    resize:none;
}

.contact-form button{
    float:right;
    margin-top:20px;
    background:#2c2c2b;
    border:none;
    padding:18px 40px;
    font-weight:600;
    cursor:pointer;
    color: #fff;
}

/* FOOTER */

.footer{
    border-top:1px solid #444;
    padding:40px 0;
}

.footer-inner{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.address{
    display:flex;
    gap:20px;
    align-items:flex-start;
}

.address i{
    font-size:28px;
}

.address h3{
    margin-bottom:10px;
    letter-spacing:2px;
}

.social{
    display:flex;
    gap:15px;
}

.social i{
    font-size:22px;
}

/* RESPONSIVE */

@media(max-width:992px){

.contact-section{
    flex-direction:column;
}

.contact-left{
    padding-left:70px;
}

.contact-left h1{
    font-size:60px;
}

}

@media(max-width:768px){

.menu-btn{
    padding:20px 0;
}

.side-line,
.logo-circle{
    display:none;
}

.contact-left{
    padding-left:0;
}

.contact-left h1{
    font-size:42px;
}

.contact-left p{
    font-size:18px;
}

.row{
    flex-direction:column;
}

.footer-inner{
    flex-direction:column;
    gap:30px;
    text-align:center;
}

.address{
    flex-direction:column;
    align-items:center;
}

.social{
    gap:30px;
}

.social i{
    font-size:34px;
}

}
/* dropdown menu */
.menu{
    position:fixed;
    top:-100vh;
    left:0;
    width:100%;
    height:100vh;     
    background:#2f2f2f;
    transition:.5s;
    z-index:1000;
    display:flex;
    justify-content:center;
    align-items:center;
}
.menu-toggle{
    position:fixed;
    top:30px;
    left:30px;
    z-index:1001;
    cursor:pointer;
}
.menu.active{
    top:0;
}

.menu ul{
    list-style:none;
    width:100%;
    text-align:center;
}

/* .menu ul li{
    border-bottom:1px solid rgba(255,255,255,.15);
} */

.menu ul li a{
    display:block;
    padding:23px;
    color:#fff;
    text-decoration:none;
    font-size:45px;
    font-weight:bold;
    letter-spacing:2px;
    transition:.3s;
}

.menu ul li a:hover{
    color: #999;
    transform: translateX(10px);
} 
/* .menu ul li a:hover{
    background:#444;
} */

.menu-toggle.active span:nth-child(1){
    transform:rotate(45deg) translate(6px,6px);
}

.menu-toggle.active span:nth-child(2){
    opacity:0;
}

.menu-toggle.active span:nth-child(3){
    transform:rotate(-45deg) translate(7px,-7px);
}
.menu-toggle span{
    display:block;
    width:30px;
    height:3px;
    background:#000;
    margin:6px 0;
    transition:.4s;
}

.menu-toggle.active span{
    background:#fff;
}
/* dropdown menu */

/* Black Curtain Animation */

.curtain{
    position: fixed;
    inset: 0;
    background: #0f0f0fd3;
    z-index: 99999;
    animation: openCurtain 1s ease-in-out forwards;
}

@keyframes openCurtain{
    from{
        transform: translateY(0);
    }
    to{
        transform: translateY(-100%);
    }
}
/* Black Curtain Animation */
.main {
    display: flex;
    justify-content: right;
    align-items: center;
    margin-right: 40px;
    top:40px;
    gap:20px;
    position: relative;
    z-index: 500;
}


</style>
</head>
<body>
    <div class="curtain">

    </div>
        <div class="main">
         <h2><b>tinyt</b>    Interactive</h2>
    </div>

    <div class="menu-toggle" onclick="toggleMenu()">
    <span></span>
    <span></span>
    <span></span>
</div>
    <nav class="menu" id="menu">
    <ul>
        <li><a href="home.html">HOME</a></li>
        <li><a href="./about-page.html">ABOUT US</a></li>
        <li><a href="./service.html">SERVICES</a></li>
        <li><a href="#">OUR WORK</a></li>
        <li><a href="./contact.html">CONTACT</a></li>
    </ul>
</nav>

<div class="wrapper">

   
    <!-- Contact Section -->

        <div class="contact-left">

            <div class="side-line"></div>

            <div class="logo-circle">
                <img src="./IMAGES/logo-sm.png">

            <div class="sub-title">Contact Us</div>

            <!-- <div class="gold-line"></div> -->

            <h1>

            <p>

    <!-- Footer -->

    <footer class="footer">

                <i class="far fa-envelope"></i>

                <div>
                    <h3>tinyt_interactive</h3>
                    <p>1st Floor, Jannath Tower, Hariharaiyyer Road</p>

                </div>

            </div>

            <div class="social">

            </div>

        </div>

    </footer>

</div>
<script>
function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
}

function toggleMenu(){
    document.getElementById("menu").classList.toggle("active");
    document.querySelector(".menu-toggle").classList.toggle("active");
}  
</script>

</body>
</html>
